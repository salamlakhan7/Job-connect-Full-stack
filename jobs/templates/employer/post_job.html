{% extends 'employer_base.html' %}

{% block title %}Post Job | Job Connect{% endblock %}
{% block breadcrumbs %}<span>Post Job</span>{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="jc-page-header">
        <p class="jc-text-caption">Job Management</p>
        <h1 class="jc-page-header-title">Post a New Job</h1>
        <p class="jc-page-header-subtitle">Publish a role using the fields currently stored by Job Connect.</p>
    </div>
    <form method="post" action="{% url 'post_job' %}" class="jc-card space-y-5">
        {% csrf_token %}
        <div class="jc-form-group">
            <label for="companyName" class="jc-label">Company Name</label>
            <input id="companyName" type="text" name="company_name" required class="jc-input" placeholder="Your company">
        </div>
        <div class="jc-form-group">
            <label for="jobTitle" class="jc-label">Job Title</label>
            <input id="jobTitle" type="text" name="title" required class="jc-input" placeholder="Role title">
        </div>
        <div class="jc-form-group">
            <label for="jobLocation" class="jc-label">Location</label>
            <input id="jobLocation" type="text" name="location" required class="jc-input" placeholder="City, country, or Remote">
        </div>
        <div class="jc-form-group">
            <label for="jobDescription" class="jc-label">Description</label>
            <textarea id="jobDescription" name="description" rows="10" required class="jc-textarea" placeholder="Responsibilities, requirements, and role details"></textarea>
        </div>
        <div class="jc-action-group">
            <button type="submit" class="jc-btn jc-btn-primary flex-1 gap-2"><i data-lucide="send" class="jc-icon"></i>Publish Job</button>
            <a href="{% url 'employer_jobs' %}" class="jc-btn jc-btn-secondary flex-1 gap-2"><i data-lucide="arrow-left" class="jc-icon"></i>Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
