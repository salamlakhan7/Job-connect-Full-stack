{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="min-h-screen bg-gray-100 py-12">
  <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-xl p-8">

    <h1 class="text-3xl font-bold text-blue-700 mb-6">Apply for {{ job.title }}</h1>

    <form method="POST" enctype="multipart/form-data" id="applicationForm">
      {% csrf_token %}

      <!-- Resume Upload -->
      <div class="mb-5">
        <label class="block font-semibold text-gray-700 mb-1">Upload Resume (PDF/DOC)</label>
        <input type="file" name="resume"
               class="w-full border border-gray-300 p-2 rounded-lg">
        {% if application.resume or user.userprofile.resume %}
        <p class="text-sm text-gray-500 mt-1">Your existing resume will be used unless you upload a replacement.</p>
        {% endif %}
      </div>

      <!-- Cover Letter -->
      <div class="mb-5">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-2">
          <label for="coverLetter" class="block font-semibold text-gray-700">Cover Letter (optional)</label>
          <button type="button" id="generateCoverLetter"
                  class="jc-btn jc-btn-sm jc-btn-outline">
            {% if cover_letter %}Regenerate with AI{% else %}Generate with AI{% endif %}
          </button>
        </div>
        <textarea name="cover_letter" id="coverLetter" rows="14"
                  class="w-full border border-gray-300 p-3 rounded-lg">{{ cover_letter }}</textarea>
        <p id="coverLetterStatus" class="text-sm mt-2" aria-live="polite"></p>
      </div>

      <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
        {% if application %}Update Application{% else %}Submit Application{% endif %}
      </button>
    </form>

  </div>
</section>

<script>
  const generateButton = document.getElementById('generateCoverLetter');
  const coverLetter = document.getElementById('coverLetter');
  const coverLetterStatus = document.getElementById('coverLetterStatus');

  generateButton.addEventListener('click', async () => {
    const originalText = generateButton.textContent;
    generateButton.disabled = true;
    generateButton.textContent = 'Generating...';
    coverLetterStatus.textContent = '';

    try {
      const response = await fetch("{% url 'generate_job_cover_letter' job.id %}", {
        method: 'POST',
        headers: {
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
        },
      });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.message || 'Cover letter generation failed.');
      }

      coverLetter.value = result.cover_letter;
      coverLetterStatus.textContent = 'Generated from your resume, career analysis, and this job. Review and edit before submitting.';
      generateButton.textContent = 'Regenerate with AI';
    } catch (error) {
      coverLetterStatus.textContent = error.message;
      generateButton.textContent = originalText;
    } finally {
      generateButton.disabled = false;
    }
  });
</script>
{% endblock %}
